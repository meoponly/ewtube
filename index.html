<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube</title>
<link rel="icon" type="image/png" href="youtube.png">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<link rel="stylesheet" href="css/main.css">
</head>
<body>
<!-- ═══════════════════════════════════════
     HTML is split into pages/ folder.
     Each section is a separate .html file
     loaded below via fetch + innerHTML.
     JS is split into js/ folder modules.
═══════════════════════════════════════ -->

<!-- YT LOADING BAR -->
<div id="yt-loading-bar"></div>

<!-- Sections are injected here by loader.js -->
<div id="app-root"></div>

<!-- Pull to refresh indicator (outside main) -->
<div id="ptr-indicator">
  <svg id="ptr-arrow" width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
</div>

<!-- ═══ JAVASCRIPT MODULES (order matters) ═══ -->
<!-- 1. Core: constants, API key manager, utilities, settings -->
<script src="js/core.js"></script>
<!-- 2. Home feed rendering -->
<script src="js/home.js"></script>
<!-- 3. Channel page logic -->
<script src="js/channel.js"></script>
<!-- 4. Search logic -->
<script src="js/search.js"></script>
<!-- 5. Navigation, notifications, profile -->
<script src="js/navigation.js"></script>
<!-- 6. Watch Later & Playlists -->
<script src="js/watchlater_playlists.js"></script>
<!-- 7. Admin panel -->
<script src="js/admin.js"></script>
<!-- 8. Pull to refresh -->
<script src="js/ptr.js"></script>
<!-- 9. Router — handles URL changes for all pages -->
<script src="js/router.js"></script>
<!-- 10. Page loader - fetches HTML partials and boots the app -->
<script src="js/loader.js"></script>
</body>
</html>
