<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<script>
  // GitHub Pages 404 fix
  // Redirects /ewtube/history → /ewtube/?r=/ewtube/history
  const base = '/ewtube/';
  const path = window.location.pathname;
  const search = window.location.search;
  window.location.replace(base + '?r=' + encodeURIComponent(path + search));
</script>
</head>
<body></body>
</html>
